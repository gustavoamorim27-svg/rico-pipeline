<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Rico · Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070B2E; --bg2:#0A0E3F; --panel:#111840; --panel2:#171F52;
  --orange:#F26522;
  --green:#46C88A; --red:#FF8086; --yellow:#F2B705; --blue:#5B8DEF; --purple:#A78BFA;
  --text:#FFF; --muted:#8E97C4; --muted2:#C7CDE8;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.14);
  --r:10px;
  --rv:#FF6B1A; --ag:#5B8DEF; --cap:#46C88A; --seg:#F2B705; --con:#A78BFA;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:'Manrope',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}

/* ── topbar ── */
.topbar{height:6px;background:var(--orange);flex-shrink:0}

/* ── header ── */
header{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:12px 20px;border-bottom:1px solid var(--line);
  background:var(--bg2);
}
.logo{font-family:'Sora';font-weight:800;font-size:22px;color:var(--orange);letter-spacing:-.5px;line-height:1}
.logo-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:2px}
.hright{display:flex;align-items:center;gap:8px}
.btn{
  font-family:'Manrope';font-weight:700;font-size:13px;border:none;cursor:pointer;
  border-radius:8px;padding:8px 14px;display:inline-flex;align-items:center;gap:6px;transition:filter .12s,transform .1s;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted2);border:1px solid var(--line2)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn svg{width:14px;height:14px;flex-shrink:0}

/* ── summary bar ── */
.sumbar{
  flex-shrink:0;display:flex;border-bottom:1px solid var(--line2);background:var(--bg2);
}
.sumcell{
  flex:1;padding:10px 16px;position:relative;border-right:1px solid var(--line);
}
.sumcell:last-child{border-right:none}
.sumcell::after{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.sumcell.s-all::after{background:var(--orange)}
.sumcell.s-rv::after{background:var(--rv)}
.sumcell.s-ag::after{background:var(--ag)}
.sumcell.s-cap::after{background:var(--cap)}
.sumcell.s-seg::after{background:var(--seg)}
.sumcell.s-con::after{background:var(--con)}
.sumcell .sl{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:3px}
.sumcell .sv{font-family:'Sora';font-weight:800;font-size:16px;display:block;line-height:1}
.sumcell .ss{font-size:10.5px;color:var(--muted);display:block;margin-top:3px}

/* ── toolbar ── */
.toolbar{
  flex-shrink:0;display:flex;align-items:center;gap:10px;
  padding:8px 20px;border-bottom:1px solid var(--line);background:rgba(5,9,35,.7);
}
.sw{
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.35);border:1px solid var(--line2);border-radius:8px;padding:7px 12px;
  flex:0 0 320px;
}
.sw svg{width:14px;height:14px;color:var(--muted);flex-shrink:0}
.sw input{background:none;border:none;outline:none;color:var(--text);font-family:'Manrope';font-size:13px;width:100%}
.sw input::placeholder{color:var(--muted)}
.rchips{display:flex;gap:6px;margin-left:auto}
.rc{
  font-family:'Manrope';font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;
  background:rgba(255,255,255,.05);border:1px solid var(--line2);color:var(--muted2);
  padding:6px 12px;border-radius:999px;transition:all .13s;
}
.rc:hover:not([class*="on"]){background:rgba(255,255,255,.1)}
.rc.on-all{background:var(--orange);color:#fff;border-color:transparent}
.rc.on-a{background:rgba(70,200,138,.2);color:var(--green);border-color:var(--green)}
.rc.on-b{background:rgba(242,183,5,.2);color:var(--yellow);border-color:var(--yellow)}
.rc.on-c{background:rgba(255,128,134,.18);color:var(--red);border-color:var(--red)}

/* ── grid ── */
.grid-wrap{flex:1;overflow:hidden;display:flex;min-height:0}
.grid{
  display:grid;grid-template-columns:repeat(5,1fr);
  width:100%;min-width:900px;overflow-x:auto;overflow-y:hidden;
}

/* ── column ── */
.col{display:flex;flex-direction:column;border-right:1px solid var(--line);overflow:hidden}
.col:last-child{border-right:none}

.col-head{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:10px 14px;border-bottom:2px solid;background:var(--bg2);
}
.col-head.rv{border-color:var(--rv)}.col-head.ag{border-color:var(--ag)}
.col-head.cap{border-color:var(--cap)}.col-head.seg{border-color:var(--seg)}.col-head.con{border-color:var(--con)}
.col-hl{display:flex;align-items:center;gap:7px}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-name{font-family:'Sora';font-weight:700;font-size:13px;white-space:nowrap}
.col-badge{font-family:'Sora';font-weight:700;font-size:11px;color:var(--muted);white-space:nowrap}

.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;
  scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}

.add-btn{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:5px;
  margin:0 10px 10px;padding:8px;border-radius:var(--r);cursor:pointer;
  border:1.5px dashed rgba(255,255,255,.14);color:var(--muted);font-size:12px;font-weight:700;
  transition:all .13s;
}
.add-btn:hover{border-color:var(--orange);color:var(--orange);background:rgba(242,101,34,.06)}
.add-btn svg{width:12px;height:12px;flex-shrink:0}

/* ── card ── */
.pcard{
  background:var(--panel);border:1px solid var(--line2);border-radius:var(--r);
  padding:12px;cursor:pointer;position:relative;
  display:flex;flex-direction:column;gap:0;
  transition:background .12s,box-shadow .12s,border-color .12s;
}
.pcard:hover{background:var(--panel2);border-color:rgba(255,255,255,.22);box-shadow:0 4px 16px rgba(0,0,0,.3)}

/* card header row: client + rank badge */
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.pc-client{font-family:'Sora';font-weight:700;font-size:13px;line-height:1.25;flex:1;word-break:break-word}
.pc-rank{
  display:flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:6px;flex-shrink:0;
  font-family:'Sora';font-weight:800;font-size:12px;
}
.pc-rank.A{background:rgba(70,200,138,.2);color:var(--green)}
.pc-rank.B{background:rgba(242,183,5,.18);color:var(--yellow)}
.pc-rank.C{background:rgba(255,128,134,.16);color:var(--red)}

/* value */
.pc-val{font-family:'Sora';font-weight:800;font-size:15px;color:#fff;margin-bottom:8px}

/* nota row: number + dots always on same line */
.pc-nota{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.pc-nota-num{font-family:'Sora';font-weight:700;font-size:12px;width:14px;flex-shrink:0;text-align:right}
.pc-dots{display:flex;gap:2px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0}
.dot.on.A{background:var(--green)}
.dot.on.B{background:var(--yellow)}
.dot.on.C{background:var(--red)}

/* next action */
.pc-next{font-size:11.5px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}

/* footer: stage + date always aligned to bottom */
.pc-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto}
.pc-stage{
  font-size:10.5px;font-weight:700;background:rgba(255,255,255,.07);
  color:var(--muted2);padding:3px 8px;border-radius:5px;white-space:nowrap;
}
.pc-date{font-size:10.5px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.pc-date.od{color:var(--red)}

/* delete x */
.pc-del{
  position:absolute;top:7px;right:7px;background:none;border:none;cursor:pointer;
  color:var(--muted);opacity:0;font-size:13px;padding:2px 5px;line-height:1;
  transition:opacity .12s,color .12s;border-radius:4px;
}
.pcard:hover .pc-del{opacity:1}
.pc-del:hover{color:var(--red);background:rgba(255,128,134,.1)}

.empty-col{font-size:12px;color:var(--muted);text-align:center;padding:20px 8px;font-style:italic}

/* ── modal ── */
.overlay{
  position:fixed;inset:0;background:rgba(4,7,28,.8);backdrop-filter:blur(5px);
  display:none;align-items:center;justify-content:center;padding:16px;z-index:70;
}
.overlay.open{display:flex}
.modal{
  width:100%;max-width:500px;
  background:linear-gradient(160deg,var(--panel2),var(--bg));
  border:1px solid var(--line2);border-radius:16px;
  box-shadow:0 24px 60px rgba(0,0,0,.55);max-height:92vh;overflow-y:auto;
}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 6px}
.mhead h2{font-family:'Sora';font-weight:700;font-size:17px}
.xbtn{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;padding:2px 6px;line-height:1}
.xbtn:hover{color:#fff}
.mbody{padding:12px 20px 6px;display:grid;grid-template-columns:1fr 1fr;gap:11px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:700}
.field input,.field select,.field textarea{
  background:rgba(0,0,0,.4);border:1px solid var(--line2);border-radius:8px;
  color:var(--text);font-family:'Manrope';font-size:13px;padding:9px 11px;outline:none;width:100%;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange)}
.field textarea{resize:vertical;min-height:56px}
.np{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.npd{
  width:32px;height:32px;border-radius:7px;border:2px solid rgba(255,255,255,.1);
  cursor:pointer;display:grid;place-items:center;font-family:'Sora';font-weight:800;font-size:13px;
  color:var(--muted);transition:all .12s;background:rgba(255,255,255,.04);flex-shrink:0;
}
.npd:hover{border-color:rgba(255,255,255,.3)}
.npd.sel.A{background:rgba(70,200,138,.28);color:var(--green);border-color:var(--green)}
.npd.sel.B{background:rgba(242,183,5,.22);color:var(--yellow);border-color:var(--yellow)}
.npd.sel.C{background:rgba(255,128,134,.18);color:var(--red);border-color:var(--red)}
.nplabel{font-size:11px;font-weight:700;padding:4px 9px;border-radius:5px;white-space:nowrap}
.mfoot{display:flex;align-items:center;padding:14px 20px 18px}
.delbtn{background:none;border:none;color:var(--red);font-weight:700;cursor:pointer;font-size:12px}
.delbtn:hover{text-decoration:underline}
.mfoot .right{display:flex;gap:8px;margin-left:auto}
</style>
</head>
<body>
<div class="topbar"></div>

<header>
  <div>
    <div class="logo">rico.</div>
    <div class="logo-sub">Pipeline de Oportunidades</div>
  </div>
  <div class="hright">
    <button class="btn btn-ghost" id="btnExport">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Backup
    </button>
    <button class="btn btn-primary" id="btnAdd">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Novo pipe
    </button>
  </div>
</header>

<div class="sumbar" id="sumbar"></div>

<div class="toolbar">
  <div class="sw">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="search" placeholder="Buscar cliente, ação ou nota…">
  </div>
  <div class="rchips">
    <div class="rc on-all" data-r="all">Todos</div>
    <div class="rc" data-r="A">🔥 A · Quente</div>
    <div class="rc" data-r="B">☀️ B · Morno</div>
    <div class="rc" data-r="C">❄️ C · Frio</div>
  </div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="mhead">
      <h2 id="mTitle">Novo pipe</h2>
      <button class="xbtn" id="btnClose">&times;</button>
    </div>
    <div class="mbody">
      <div class="field full"><label>Cliente</label><input id="f-client" placeholder="Nome do cliente"></div>
      <div class="field"><label>Categoria</label><select id="f-cat"></select></div>
      <div class="field"><label>Estágio</label><select id="f-stage"></select></div>
      <div class="field full">
        <label>Nota de temperatura (0 = frio · 10 = fechando)</label>
        <div class="np" id="notaPicker"></div>
      </div>
      <div class="field"><label>Valor potencial (R$)</label><input id="f-value" inputmode="numeric" placeholder="200.000"></div>
      <div class="field"><label>Data prevista</label><input id="f-date" type="date"></div>
      <div class="field full"><label>Próxima ação</label><input id="f-next" placeholder="Ex.: Enviar proposta"></div>
      <div class="field full"><label>Notas</label><textarea id="f-notes" placeholder="Perfil, contexto, objeções…"></textarea></div>
    </div>
    <div class="mfoot">
      <button class="delbtn" id="btnDel" style="display:none">Excluir pipe</button>
      <div class="right">
        <button class="btn btn-ghost" id="btnCancel">Cancelar</button>
        <button class="btn btn-primary" id="btnSave">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
const CATS=[
  {id:'rv', name:'Renda Variável', color:'#FF6B1A'},
  {id:'ag', name:'Alocação Geral', color:'#5B8DEF'},
  {id:'cap',name:'Captação',       color:'#46C88A'},
  {id:'seg',name:'Seguros',        color:'#F2B705'},
  {id:'con',name:'Consórcio',      color:'#A78BFA'},
];
const STAGES=['Primeiro contato','Em análise','Proposta enviada','Negociação','Aguardando decisão','Ganho','Perdido'];
const STORE='ricoPipeline.v4';

const rankOf=n=>n>=8?'A':n>=5?'B':'C';
const RL={'A':'🔥 A · Quente','B':'☀️ B · Morno','C':'❄️ C · Frio'};
const RC={'A':'rgba(70,200,138,.18)','B':'rgba(242,183,5,.15)','C':'rgba(255,128,134,.16)'};
const RCO={'A':'var(--green)','B':'var(--yellow)','C':'var(--red)'};
const catById=id=>CATS.find(c=>c.id===id)||CATS[0];

let pipes=load(), filterRank='all', q='', editId=null, selNota=5;

function load(){try{const r=localStorage.getItem(STORE);if(r)return JSON.parse(r);}catch(e){}return seed();}
function save(){localStorage.setItem(STORE,JSON.stringify(pipes));}
function uid(){return Math.random().toString(36).slice(2,10);}
function inDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function seed(){return[
  {id:uid(),client:'Marina Albuquerque',cat:'ag', nota:9, value:200000,stage:'Negociação',         next:'Apresentar proposta de carteira',   date:inDays(3), notes:'Resgatou CDB no banco. Perfil moderado.'},
  {id:uid(),client:'Carlos Teixeira',   cat:'ag', nota:6, value:80000, stage:'Proposta enviada',   next:'Comparativo PGBL x VGBL',          date:inDays(6), notes:'Declara IR completo, foco em dedução.'},
  {id:uid(),client:'Família Nogueira',  cat:'con',nota:4, value:350000,stage:'Em análise',          next:'Simular carta de R$ 350k',         date:inDays(10),notes:'Troca de imóvel em 18 meses.'},
  {id:uid(),client:'Roberto Lima',      cat:'rv', nota:3, value:120000,stage:'Primeiro contato',    next:'Sondar apetite p/ proteção',       date:inDays(14),notes:'Concentrado em PETR4.'},
  {id:uid(),client:'Ana Paula Souza',   cat:'seg',nota:10,value:24000, stage:'Ganho',               next:'Apólice emitida',                  date:inDays(-2),notes:'Seguro de vida fechado.'},
  {id:uid(),client:'Pedro Cavalcanti',  cat:'cap',nota:7, value:500000,stage:'Aguardando decisão',  next:'Follow-up após reunião de sócios', date:inDays(5), notes:'Empresa familiar, 3 sócios.'},
  {id:uid(),client:'Juliana Rezende',   cat:'rv', nota:8, value:90000, stage:'Negociação',          next:'Enviar tese VALE3 + hedge cambial',date:inDays(2), notes:'Quer aumentar exposição internacional.'},
  {id:uid(),client:'Marcos Andrade',    cat:'cap',nota:5, value:300000,stage:'Em análise',          next:'Apresentar relatório de captação', date:inDays(7), notes:'Herdeiro de empresa familiar.'},
  {id:uid(),client:'Beatriz Lemos',     cat:'rv', nota:7, value:65000, stage:'Proposta enviada',    next:'Discutir alocação em BDRs',        date:inDays(4), notes:'Tem conta no BTG também.'},
];}

const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function brl(n){if(!n)return'R$0';n=Math.round(+n);if(n>=1e6)return'R$'+(n/1e6).toLocaleString('pt-BR',{maximumFractionDigits:1})+'mi';if(n>=1e3)return'R$'+Math.round(n/1e3)+'mil';return'R$'+n.toLocaleString('pt-BR');}
function brlFull(n){return'R$ '+Math.round(+n||0).toLocaleString('pt-BR');}
function fmtDate(s){if(!s)return'—';return new Date(s+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function overdue(s,stage){if(!s||stage==='Ganho'||stage==='Perdido')return false;return new Date(s+'T00:00:00')<new Date();}
function parseNum(s){return+(String(s).replace(/[^\d]/g,''))||0;}

function visFor(catId){
  return pipes.filter(p=>{
    if(p.cat!==catId)return false;
    if(filterRank!=='all'&&rankOf(+p.nota)!==filterRank)return false;
    if(q){const t=(p.client+' '+p.next+' '+p.notes+' '+(p.stage||'')).toLowerCase();if(!t.includes(q.toLowerCase()))return false;}
    return true;
  });
}

/* ── render ── */
function renderSumbar(){
  const open=pipes.filter(p=>p.stage!=='Ganho'&&p.stage!=='Perdido');
  const tot=open.reduce((a,p)=>a+(+p.value||0),0);
  const won=pipes.filter(p=>p.stage==='Ganho').reduce((a,p)=>a+(+p.value||0),0);
  let h=`<div class="sumcell s-all"><span class="sl">Total pipeline</span><span class="sv">${brl(tot)}</span><span class="ss">${open.length} em aberto · ${brl(won)} ganho</span></div>`;
  CATS.forEach(c=>{
    const items=pipes.filter(p=>p.cat===c.id&&p.stage!=='Ganho'&&p.stage!=='Perdido');
    const sum=items.reduce((a,p)=>a+(+p.value||0),0);
    h+=`<div class="sumcell s-${c.id}"><span class="sl">${c.name}</span><span class="sv">${brl(sum)}</span><span class="ss">${items.length} pipe${items.length!==1?'s':''}</span></div>`;
  });
  document.getElementById('sumbar').innerHTML=h;
}

function renderGrid(){
  document.getElementById('grid').innerHTML=CATS.map(c=>{
    const items=visFor(c.id);
    const sum=items.reduce((a,p)=>a+(+p.value||0),0);
    const cards=items.length
      ? items.map(p=>cardHTML(p)).join('')
      : `<div class="empty-col">Sem pipes aqui.</div>`;
    return `<div class="col">
      <div class="col-head ${c.id}">
        <div class="col-hl">
          <div class="col-dot" style="background:${c.color}"></div>
          <span class="col-name">${c.name}</span>
        </div>
        <span class="col-badge">${items.length} · ${brl(sum)}</span>
      </div>
      <div class="col-body">${cards}</div>
      <div class="add-btn" data-cat="${c.id}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar pipe
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.pcard').forEach(card=>{
    card.addEventListener('click',e=>{if(e.target.closest('.pc-del'))return;openModal(card.dataset.id);});
    card.querySelector('.pc-del').onclick=e=>{e.stopPropagation();quickDel(card.dataset.id);};
  });
  document.querySelectorAll('.add-btn').forEach(btn=>{
    btn.onclick=()=>openModal(null,btn.dataset.cat);
  });
}

function cardHTML(p){
  const rank=rankOf(+p.nota);
  const nota=+p.nota;
  const dots=Array.from({length:10},(_,i)=>`<div class="dot ${i<nota?'on '+rank:''}"></div>`).join('');
  const od=overdue(p.date,p.stage);
  return `<div class="pcard" data-id="${p.id}">
    <button class="pc-del" title="Excluir">✕</button>
    <div class="pc-top">
      <div class="pc-client">${esc(p.client)}</div>
      <span class="pc-rank ${rank}">${rank}</span>
    </div>
    <div class="pc-val">${brlFull(p.value)}</div>
    <div class="pc-nota">
      <span class="pc-nota-num" style="color:${RCO[rank]}">${nota}</span>
      <div class="pc-dots">${dots}</div>
    </div>
    ${p.next?`<div class="pc-next" title="${esc(p.next)}">→ ${esc(p.next)}</div>`:'<div class="pc-next" style="color:var(--muted);font-style:italic">Sem próxima ação</div>'}
    <div class="pc-foot">
      <span class="pc-stage">${esc(p.stage)}</span>
      <span class="pc-date ${od?'od':''}">${fmtDate(p.date)}${od?' ⚠':''}</span>
    </div>
  </div>`;
}

function render(){renderSumbar();renderGrid();}

/* ── nota picker ── */
function buildNP(val){
  selNota=val??5;
  const r=rankOf(selNota);
  const el=document.getElementById('notaPicker');
  let h='';
  for(let i=0;i<=10;i++){
    const ri=rankOf(i);
    h+=`<div class="npd ${i===selNota?'sel '+ri:''}" data-n="${i}">${i}</div>`;
  }
  h+=`<span class="nplabel" style="background:${RC[r]};color:${RCO[r]}">${RL[r]}</span>`;
  el.innerHTML=h;
  el.querySelectorAll('.npd').forEach(d=>d.onclick=()=>buildNP(+d.dataset.n));
}

/* ── modal ── */
function fillSelects(){
  document.getElementById('f-cat').innerHTML=CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('f-stage').innerHTML=STAGES.map(s=>`<option>${s}</option>`).join('');
}
function openModal(id,presetCat){
  editId=id||null;
  const p=id?pipes.find(x=>x.id===id):{};
  document.getElementById('mTitle').textContent=id?'Editar pipe':'Novo pipe';
  document.getElementById('btnDel').style.display=id?'block':'none';
  document.getElementById('f-client').value=p.client||'';
  document.getElementById('f-cat').value=p.cat||presetCat||'rv';
  document.getElementById('f-stage').value=p.stage||'Primeiro contato';
  buildNP(p.nota??5);
  document.getElementById('f-value').value=p.value?(+p.value).toLocaleString('pt-BR'):'';
  document.getElementById('f-date').value=p.date||'';
  document.getElementById('f-next').value=p.next||'';
  document.getElementById('f-notes').value=p.notes||'';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('f-client').focus();
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function saveModal(){
  const client=document.getElementById('f-client').value.trim();
  if(!client){document.getElementById('f-client').focus();return;}
  const data={client,cat:document.getElementById('f-cat').value,stage:document.getElementById('f-stage').value,
    nota:selNota,value:parseNum(document.getElementById('f-value').value),
    date:document.getElementById('f-date').value,next:document.getElementById('f-next').value.trim(),
    notes:document.getElementById('f-notes').value.trim()};
  if(editId){Object.assign(pipes.find(x=>x.id===editId),data);}
  else{pipes.unshift({id:uid(),...data});}
  save();render();closeModal();
}
function quickDel(id){if(!confirm('Excluir este pipe?'))return;pipes=pipes.filter(x=>x.id!==id);save();render();}

/* ── wire ── */
fillSelects();render();
document.getElementById('btnAdd').onclick=()=>openModal(null);
document.getElementById('btnClose').onclick=closeModal;
document.getElementById('btnCancel').onclick=closeModal;
document.getElementById('btnSave').onclick=saveModal;
document.getElementById('btnDel').onclick=()=>{if(editId&&confirm('Excluir?')){pipes=pipes.filter(x=>x.id!==editId);save();render();closeModal();}};
document.getElementById('btnExport').onclick=()=>{
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(pipes,null,2)],{type:'application/json'}));
  a.download='rico-pipeline-'+new Date().toISOString().slice(0,10)+'.json';a.click();
};
document.getElementById('search').oninput=e=>{q=e.target.value;render();};
document.querySelectorAll('.rc').forEach(chip=>{
  chip.onclick=()=>{
    filterRank=chip.dataset.r;
    document.querySelectorAll('.rc').forEach(c=>{
      c.className='rc'+(c.dataset.r===filterRank?' on-'+(filterRank==='all'?'all':filterRank.toLowerCase()):'');
    });
    render();
  };
});
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
