<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Rico · Pipeline</title>
<meta name="theme-color" content="#070B2E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pipeline">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Crect width='48' height='48' rx='12' fill='%23F26522'/%3E%3Crect x='11' y='14' width='26' height='5' rx='2.5' fill='%23fff'/%3E%3Crect x='14.5' y='23.5' width='19' height='5' rx='2.5' fill='%23fff'/%3E%3Crect x='18' y='33' width='12' height='5' rx='2.5' fill='%23fff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070B2E; --bg2:#0A0E3F; --panel:#111840; --panel2:#171F52;
  --orange:#F26522;
  --green:#46C88A; --red:#FF8086; --yellow:#F2B705; --blue:#5B8DEF; --purple:#A78BFA;
  --text:#FFF; --muted:#8E97C4; --muted2:#C7CDE8;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.14);
  --r:10px;
  --rv:#FF6B1A; --ag:#5B8DEF; --cap:#46C88A; --seg:#F2B705; --con:#A78BFA;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:'Manrope',system-ui,sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;
  display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent}
body.dragging{user-select:none;-webkit-user-select:none}

.topbar{height:6px;background:var(--orange);flex-shrink:0;padding-top:var(--safe-t);background-clip:content-box}

header{
  flex-shrink:0;display:flex;align-items:center;gap:12px;
  padding:12px 20px;border-bottom:1px solid var(--line);background:var(--bg2);
}
.brand{display:flex;align-items:center;gap:10px}
.mk{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:block}
.logo{font-family:'Sora';font-weight:800;font-size:22px;color:var(--orange);letter-spacing:-.5px;line-height:1}
.logo-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:2px}
.htotal{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;line-height:1.15}
.htotal .ht-v{font-family:'Sora';font-weight:800;font-size:18px}
.htotal .ht-s{font-size:10.5px;color:var(--muted);white-space:nowrap}
.hright{display:flex;align-items:center;gap:8px;margin-left:16px}
.btn{
  font-family:'Manrope';font-weight:700;font-size:13px;border:none;cursor:pointer;
  border-radius:8px;padding:9px 14px;display:inline-flex;align-items:center;gap:6px;
  transition:filter .12s,transform .1s;
}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--orange);color:#fff}.btn-primary:hover{filter:brightness(1.1)}
.btn-ghost{background:rgba(255,255,255,.06);color:var(--muted2);border:1px solid var(--line2)}.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn svg{width:15px;height:15px;flex-shrink:0}

.sumbar{flex-shrink:0;display:flex;border-bottom:1px solid var(--line2);background:var(--bg2)}
.sumcell{flex:1;padding:10px 16px;position:relative;border-right:1px solid var(--line);min-width:0}
.sumcell:last-child{border-right:none}
.sumcell::after{content:"";position:absolute;top:0;left:0;right:0;height:3px}
.sumcell.s-all{display:none}
.sumcell.s-all::after{background:var(--orange)}
.sumcell.s-rv::after{background:var(--rv)}
.sumcell.s-ag::after{background:var(--ag)}
.sumcell.s-cap::after{background:var(--cap)}
.sumcell.s-cross::after{background:linear-gradient(90deg,var(--seg),var(--con))}
.sumcell .sl{font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sumcell .sv{font-family:'Sora';font-weight:800;font-size:16px;display:block;line-height:1}
.sumcell .ss{font-size:10.5px;color:var(--muted);display:block;margin-top:3px;white-space:nowrap}

.toolbar{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:8px 20px;border-bottom:1px solid var(--line);background:rgba(5,9,35,.7)}
.sw{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.35);border:1px solid var(--line2);border-radius:8px;padding:9px 12px;flex:0 0 320px}
.sw svg{width:14px;height:14px;color:var(--muted);flex-shrink:0}
.sw input{background:none;border:none;outline:none;color:var(--text);font-family:'Manrope';font-size:16px;width:100%}
.sw input::placeholder{color:var(--muted)}
.filters{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap;align-items:center}
.rchips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none}
.rchips::-webkit-scrollbar{display:none}
.rc{font-family:'Manrope';font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;background:rgba(255,255,255,.05);border:1px solid var(--line2);color:var(--muted2);padding:7px 12px;border-radius:999px;transition:all .13s;flex-shrink:0}
.rc:hover:not([class*="on"]){background:rgba(255,255,255,.1)}
.rc.on-all{background:var(--orange);color:#fff;border-color:transparent}
.rc.on-a{background:rgba(70,200,138,.2);color:var(--green);border-color:var(--green)}
.rc.on-b{background:rgba(242,183,5,.2);color:var(--yellow);border-color:var(--yellow)}
.rc.on-c{background:rgba(255,128,134,.18);color:var(--red);border-color:var(--red)}
.rc.dc.on{background:var(--blue);color:#fff;border-color:transparent}

.grid-wrap{flex:1;overflow:hidden;display:flex;min-height:0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);width:100%;overflow:hidden}

.col{display:flex;flex-direction:column;border-right:1px solid var(--line);overflow:hidden;min-width:0}
.col:last-child{border-right:none}
.col-head{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 14px;border-bottom:2px solid;background:var(--bg2)}
.col-head.rv{border-color:var(--rv)}.col-head.ag{border-color:var(--ag)}
.col-head.cap{border-color:var(--cap)}
.col-head.cross{border-bottom:2px solid;border-image:linear-gradient(90deg,var(--seg),var(--con)) 1}
.col-hl{display:flex;align-items:center;gap:7px;min-width:0}
.col-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.col-dots{display:flex;gap:3px;flex-shrink:0}
.col-name{font-family:'Sora';font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.col-badge{font-family:'Sora';font-weight:700;font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.col-body{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent;-webkit-overflow-scrolling:touch}
.col-body::-webkit-scrollbar{width:4px}
.col-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}

.add-btn{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:5px;margin:0 10px 10px;padding:10px;border-radius:var(--r);cursor:pointer;border:1.5px dashed rgba(255,255,255,.14);color:var(--muted);font-size:12px;font-weight:700;transition:all .13s}
.add-btn:hover{border-color:var(--orange);color:var(--orange);background:rgba(242,101,34,.06)}
.add-btn svg{width:12px;height:12px;flex-shrink:0}

.pcard{background:var(--panel);border:1px solid var(--line2);border-left-width:3px;border-radius:var(--r);padding:12px;cursor:pointer;position:relative;display:flex;flex-direction:column;gap:0;transition:background .12s,box-shadow .12s,border-color .12s;touch-action:auto}
.pcard:hover{background:var(--panel2);border-color:rgba(255,255,255,.22);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.pcard.drag-src{opacity:.35}
.pc-catrow{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;color:var(--muted2);margin-bottom:7px}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.pc-client{font-family:'Sora';font-weight:700;font-size:13px;line-height:1.25;flex:1;word-break:break-word}
.pc-rank{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;flex-shrink:0;font-family:'Sora';font-weight:800;font-size:12px}
.pc-rank.A{background:rgba(70,200,138,.2);color:var(--green)}
.pc-rank.B{background:rgba(242,183,5,.18);color:var(--yellow)}
.pc-rank.C{background:rgba(255,128,134,.16);color:var(--red)}
.pc-val{font-family:'Sora';font-weight:800;font-size:15px;color:#fff;margin-bottom:6px}
.pc-sub{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;background:rgba(70,200,138,.16);color:var(--green);padding:3px 8px;border-radius:5px;margin-bottom:8px;align-self:flex-start;text-transform:uppercase;letter-spacing:.5px}
.pc-nota{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.pc-nota-num{font-family:'Sora';font-weight:700;font-size:12px;width:14px;flex-shrink:0;text-align:right}
.pc-dots{display:flex;gap:2px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0}
.dot.on.A{background:var(--green)}.dot.on.B{background:var(--yellow)}.dot.on.C{background:var(--red)}
.pc-next{font-size:11.5px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:8px}
.pc-foot{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto}
.pc-stage{font-size:10.5px;font-weight:700;background:rgba(255,255,255,.07);color:var(--muted2);padding:3px 8px;border-radius:5px;white-space:nowrap}
.pc-date{font-size:10.5px;color:var(--muted);white-space:nowrap;flex-shrink:0}
.pc-date.od{color:var(--red)}
.pc-del{position:absolute;top:7px;right:7px;background:none;border:none;cursor:pointer;color:var(--muted);opacity:0;font-size:13px;padding:4px 7px;line-height:1;transition:opacity .12s,color .12s;border-radius:4px}
.pcard:hover .pc-del{opacity:1}
.pc-del:hover{color:var(--red);background:rgba(255,128,134,.1)}
.empty-col{font-size:12px;color:var(--muted);text-align:center;padding:20px 8px;font-style:italic}

/* drag clone + dropzones */
.drag-clone{position:fixed;z-index:120;pointer-events:none;opacity:.96;transform:rotate(-1.5deg) scale(1.03);box-shadow:0 18px 40px rgba(0,0,0,.55);margin:0!important}
.dropzones{position:fixed;left:0;right:0;bottom:calc(18px + var(--safe-b));display:flex;gap:14px;justify-content:center;z-index:110;pointer-events:none;opacity:0;transform:translateY(24px);transition:opacity .18s,transform .18s;padding:0 16px}
.dropzones.show{opacity:1;transform:translateY(0)}
.dz{flex:0 0 auto;width:150px;max-width:42vw;height:84px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-weight:800;font-family:'Sora';font-size:13px;border:2px dashed;background:rgba(10,14,40,.92);backdrop-filter:blur(6px);transition:transform .12s,background .12s;touch-action:none}
.dz .dz-ic{font-size:26px;line-height:1}
.dz.win{border-color:var(--green);color:var(--green)}
.dz.lost{border-color:var(--red);color:var(--red)}
.dz.win.hot{background:rgba(70,200,138,.28);transform:scale(1.08)}
.dz.lost.hot{background:rgba(255,128,134,.26);transform:scale(1.08)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(4,7,28,.8);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:16px;z-index:70}
.overlay.open{display:flex}
.modal{width:100%;max-width:500px;background:linear-gradient(160deg,var(--panel2),var(--bg));border:1px solid var(--line2);border-radius:16px;box-shadow:0 24px 60px rgba(0,0,0,.55);max-height:92vh;overflow-y:auto}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 6px}
.mhead h2{font-family:'Sora';font-weight:700;font-size:17px}
.xbtn{background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;padding:2px 8px;line-height:1}
.xbtn:hover{color:#fff}
.mbody{padding:12px 20px 6px;display:grid;grid-template-columns:1fr 1fr;gap:11px}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
.field label{font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);font-weight:700}
.field input,.field select,.field textarea{background:rgba(0,0,0,.4);border:1px solid var(--line2);border-radius:8px;color:var(--text);font-family:'Manrope';font-size:16px;padding:11px 12px;outline:none;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange)}
.field textarea{resize:vertical;min-height:56px}
.np{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.npd{width:34px;height:34px;border-radius:7px;border:2px solid rgba(255,255,255,.1);cursor:pointer;display:grid;place-items:center;font-family:'Sora';font-weight:800;font-size:13px;color:var(--muted);transition:all .12s;background:rgba(255,255,255,.04);flex-shrink:0}
.npd:hover{border-color:rgba(255,255,255,.3)}
.npd.sel.A{background:rgba(70,200,138,.28);color:var(--green);border-color:var(--green)}
.npd.sel.B{background:rgba(242,183,5,.22);color:var(--yellow);border-color:var(--yellow)}
.npd.sel.C{background:rgba(255,128,134,.18);color:var(--red);border-color:var(--red)}
.nplabel{font-size:11px;font-weight:700;padding:5px 10px;border-radius:5px;white-space:nowrap}
.mfoot{display:flex;align-items:center;padding:14px 20px calc(18px + var(--safe-b))}
.delbtn{background:none;border:none;color:var(--red);font-weight:700;cursor:pointer;font-size:13px;padding:8px 0}
.delbtn:hover{text-decoration:underline}
.mfoot .right{display:flex;gap:8px;margin-left:auto}

/* histórico */
.histlist{padding:6px 16px 6px;display:flex;flex-direction:column;gap:8px;max-height:54vh;overflow-y:auto}
.hsum{display:flex;gap:10px;padding:6px 20px 10px}
.hsum .hs{flex:1;border:1px solid var(--line2);border-radius:10px;padding:9px 12px}
.hsum .hs .l{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700}
.hsum .hs .v{font-family:'Sora';font-weight:800;font-size:16px;margin-top:3px}
.hitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line2);border-radius:10px;padding:10px 12px;background:var(--panel)}
.hi-out{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-size:16px;flex-shrink:0}
.hi-out.Ganho{background:rgba(70,200,138,.18)}
.hi-out.Perdido{background:rgba(255,128,134,.16)}
.hi-main{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.hi-client{font-family:'Sora';font-weight:700;font-size:13px;line-height:1.2}
.hi-meta{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hi-act{display:flex;gap:6px;flex-shrink:0}
.hi-act button{font-family:'Manrope';font-weight:700;font-size:11px;cursor:pointer;border-radius:7px;padding:6px 9px;border:1px solid var(--line2);background:rgba(255,255,255,.05);color:var(--muted2)}
.hi-act button.reopen:hover{color:var(--green);border-color:var(--green)}
.hi-act button.del:hover{color:var(--red);border-color:var(--red)}
.hist-empty{padding:30px 16px;text-align:center;color:var(--muted);font-style:italic;font-size:13px}

.toast{position:fixed;left:50%;bottom:calc(20px + var(--safe-b));transform:translateX(-50%) translateY(20px);background:var(--panel2);border:1px solid var(--line2);color:var(--text);font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.5);z-index:130;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ════════ MOBILE ════════ */
@media (max-width:720px){
  html,body{height:auto;min-height:100%;overflow:visible}
  body{display:block}
  header{position:sticky;top:0;z-index:40;padding:10px 14px;gap:8px;flex-wrap:wrap}
  .mk{width:30px;height:30px}
  .logo{font-size:19px}
  .logo-sub{font-size:9px;letter-spacing:1.5px}
  .htotal{display:none}
  .hright{margin-left:auto;gap:6px}
  .btn{padding:9px 11px}
  .btn .bt{display:none}
  #btnAdd .bt{display:inline}
  #btnAdd{padding:9px 13px}
  .sumbar{overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--line2)}
  .sumbar::-webkit-scrollbar{display:none}
  .sumcell{flex:0 0 auto;min-width:120px;padding:10px 14px}
  .sumcell.s-all{display:block;min-width:154px;background:rgba(242,101,34,.06)}
  .toolbar{flex-wrap:wrap;padding:8px 14px;gap:8px;position:sticky;top:51px;z-index:30}
  .sw{flex:1 1 100%;order:2}
  .filters{width:100%;order:1;margin-left:0;flex-direction:column;align-items:stretch;gap:6px}
  .rchips{width:100%}
  .grid-wrap{overflow:visible;display:block;flex:none}
  .grid{display:block;width:100%}
  .col{border-right:none;border-bottom:8px solid var(--bg);overflow:visible}
  .col-head{position:sticky;top:108px;z-index:20}
  .col-body{overflow:visible;display:block;padding:10px 14px}
  .col-body .pcard{margin-bottom:8px}
  .col-body .pcard:last-child{margin-bottom:0}
  .add-btn{margin:0 14px 12px}
  .pc-del{opacity:1;top:8px;right:8px;font-size:15px;padding:6px 9px}
  .pc-client{font-size:14px}.pc-val{font-size:16px}.pc-next{font-size:12px}
  .overlay{padding:0;align-items:flex-end}
  .modal{max-width:100%;max-height:94vh;border-radius:18px 18px 0 0;border-bottom:none}
  .mbody{grid-template-columns:1fr}
  .mbody .field:not(.full){grid-column:1/-1}
}
</style>
</head>
<body>
<div class="topbar"></div>

<header>
  <div class="brand">
    <svg class="mk" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="12" fill="#F26522"/>
      <rect x="11" y="14" width="26" height="5" rx="2.5" fill="#fff"/>
      <rect x="14.5" y="23.5" width="19" height="5" rx="2.5" fill="#fff"/>
      <rect x="18" y="33" width="12" height="5" rx="2.5" fill="#fff"/>
    </svg>
    <div><div class="logo">rico.</div><div class="logo-sub">Pipeline</div></div>
  </div>

  <div class="htotal" id="htotal"></div>

  <div class="hright">
    <button class="btn btn-ghost" id="btnHist" title="Histórico (ganhos e perdidos)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
      <span class="bt">Histórico</span>
    </button>
    <button class="btn btn-ghost" id="btnImport" title="Restaurar backup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 9v-4a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v4M7 14l5-5 5 5M12 9v12"/></svg>
      <span class="bt">Restaurar</span>
    </button>
    <button class="btn btn-ghost" id="btnExport" title="Baixar backup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      <span class="bt">Backup</span>
    </button>
    <button class="btn btn-primary" id="btnAdd">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      <span class="bt">Novo pipe</span>
    </button>
  </div>
</header>

<div class="sumbar" id="sumbar"></div>

<script>
/* categorias reais (modelo de dados) */
const CATS=[
  {id:'rv', name:'Renda Variável', color:'#FF6B1A'},
  {id:'ag', name:'Alocação Geral', color:'#5B8DEF'},
  {id:'cap',name:'Captação',       color:'#46C88A'},
  {id:'seg',name:'Seguros',        color:'#F2B705'},
  {id:'con',name:'Consórcio',      color:'#A78BFA'},
];
/* colunas visuais (Seguros + Consórcio = Crossell) */
const COLUMNS=[
  {id:'rv',   cls:'rv',   name:'Renda Variável', cats:['rv']},
  {id:'ag',   cls:'ag',   name:'Alocação Geral', cats:['ag']},
  {id:'cap',  cls:'cap',  name:'Captação',       cats:['cap']},
  {id:'cross',cls:'cross',name:'Crossell',       cats:['seg','con'], mixed:true},
];
const STAGES=['Primeiro contato','Em análise','Proposta enviada','Negociação','Aguardando decisão'];
const SUBTYPES=['Previdência','TED','STVM','PJ','Consultoria','Originação'];
const NEXT_ACTIONS=['Enviar Proposta','Entrar em contato depois','Continuar Desenvolvendo','Marcar Reunião','Aguardar Resposta','Esperar Produto Porrada'];
function valueRange(cat){
  if(cat==='seg')return[3000,5000,10000,15000,20000,30000,40000,50000,60000];
  if(cat==='con')return[100000,150000,200000,300000,500000,750000,1000000,1500000,2000000,2500000,3000000];
  if(cat==='cap')return[30000,40000,50000,60000,70000,80000,90000,100000,150000,200000,250000,300000,350000,400000,450000,500000,600000,700000,800000,900000,1000000];
  return[30000,40000,50000,60000,70000,80000,90000,100000,150000,200000,250000,300000,350000,400000,450000,500000];
}

/* ════════ PERSISTÊNCIA BLINDADA (pipes + histórico) ════════ */
const STORE='ricoPipeline.v4', BACKUP='ricoPipeline.backup';
const HSTORE='ricoPipeline.history.v1', HBACKUP='ricoPipeline.history.backup';
const INITF='ricoPipeline.initialized';
const LEGACY=['ricoPipeline.v4','ricoPipeline.v3','ricoPipeline.v2','ricoPipeline.v1'];
const IDB_DB='ricoPipelineDB', IDB_STORE='kv';

function readLS(key){try{const r=localStorage.getItem(key);if(r==null)return null;const v=JSON.parse(r);return Array.isArray(v)?v:null;}catch(e){return null;}}
function rawLS(key){try{return localStorage.getItem(key);}catch(e){return null;}}
function idbOpen(){return new Promise((res,rej)=>{try{const r=indexedDB.open(IDB_DB,1);r.onupgradeneeded=()=>{try{r.result.createObjectStore(IDB_STORE);}catch(e){}};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}catch(e){rej(e);}});}
async function idbGet(key){try{const db=await idbOpen();return await new Promise(res=>{const g=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);g.onsuccess=()=>res(Array.isArray(g.result)?g.result:null);g.onerror=()=>res(null);});}catch(e){return null;}}
async function idbSet(key,arr){try{const db=await idbOpen();db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(arr,key);}catch(e){}}

function loadSync(){
  const p=readLS(STORE);          if(p&&p.length)return p;
  const b=readLS(BACKUP);         if(b&&b.length)return b;
  for(const k of LEGACY){if(k===STORE)continue;const x=readLS(k);if(x&&x.length)return x;}
  if(p!==null)return p;
  if(rawLS(INITF)==='1')return [];
  return null;
}
function loadHistSync(){
  const h=readLS(HSTORE); if(h)return h;
  const b=readLS(HBACKUP); if(b)return b;
  return null;
}

let pipes=[], history=[], filterRank='all', filterDate='all', q='', editId=null, selNota=5;

async function init(){
  let v=loadSync();
  if(v===null){const idb=await idbGet('pipes');if(idb&&idb.length)v=idb;}
  if(v===null){v=seed();try{localStorage.setItem(INITF,'1');}catch(e){}}
  let h=loadHistSync();
  if(h===null){const ih=await idbGet('history');h=ih||[];}
  pipes=v; history=h||[];
  migrateClosed();
  persist();
  fillSelects();render();wire();
}

function migrateClosed(){
  const keep=[];
  for(const p of pipes){
    if(p.stage==='Ganho'||p.stage==='Perdido'){
      history.unshift(Object.assign({},p,{outcome:p.stage,closedAt:p.closedAt||new Date().toISOString()}));
    }else keep.push(p);
  }
  pipes=keep;
}

function persist(){
  const pj=JSON.stringify(pipes), hj=JSON.stringify(history);
  try{localStorage.setItem(STORE,pj);}catch(e){}
  try{localStorage.setItem(BACKUP,pj);}catch(e){}
  try{localStorage.setItem(HSTORE,hj);}catch(e){}
  try{localStorage.setItem(HBACKUP,hj);}catch(e){}
  try{localStorage.setItem(INITF,'1');}catch(e){}
  idbSet('pipes',pipes); idbSet('history',history);
}

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-3);}
function inDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function seed(){return[
  {id:uid(),client:'Marina Albuquerque',cat:'ag', nota:9, value:90000, stage:'Negociação',         next:'Marcar Reunião',          date:inDays(3), notes:'Resgatou CDB no banco. Perfil moderado.'},
  {id:uid(),client:'Carlos Teixeira',   cat:'ag', nota:6, value:80000, stage:'Proposta enviada',   next:'Enviar Proposta',         date:inDays(6), notes:'Declara IR completo, foco em dedução.'},
  {id:uid(),client:'Família Nogueira',  cat:'con',nota:4, value:350000,stage:'Em análise',          next:'Continuar Desenvolvendo', date:inDays(10),notes:'Troca de imóvel em 18 meses.'},
  {id:uid(),client:'Roberto Lima',      cat:'rv', nota:3, value:60000, stage:'Primeiro contato',    next:'Entrar em contato depois',date:inDays(14),notes:'Concentrado em PETR4.'},
  {id:uid(),client:'Pedro Cavalcanti',  cat:'cap',nota:7, value:90000, stage:'Aguardando decisão',  next:'Aguardar Resposta',       date:inDays(5), notes:'Empresa familiar, 3 sócios.',subtype:'TED'},
  {id:uid(),client:'Juliana Rezende',   cat:'rv', nota:8, value:90000, stage:'Negociação',          next:'Enviar Proposta',         date:inDays(2), notes:'Quer aumentar exposição internacional.'},
  {id:uid(),client:'Marcos Andrade',    cat:'cap',nota:5, value:100000,stage:'Em análise',          next:'Continuar Desenvolvendo', date:inDays(7), notes:'Herdeiro de empresa familiar.',subtype:'STVM'},
  {id:uid(),client:'Beatriz Lemos',     cat:'rv', nota:7, value:65000, stage:'Proposta enviada',    next:'Marcar Reunião',          date:inDays(4), notes:'Tem conta no BTG também.'},
  {id:uid(),client:'Helena Castro',     cat:'seg',nota:8, value:30000, stage:'Negociação',          next:'Enviar Proposta',         date:inDays(3), notes:'Dois filhos, busca proteção familiar.'},
];}

const rankOf=n=>n>=8?'A':n>=5?'B':'C';
const RL={'A':'🔥 A · Quente','B':'☀️ B · Morno','C':'❄️ C · Frio'};
const RC={'A':'rgba(70,200,138,.18)','B':'rgba(242,183,5,.15)','C':'rgba(255,128,134,.16)'};
const RCO={'A':'var(--green)','B':'var(--yellow)','C':'var(--red)'};
const catById=id=>CATS.find(c=>c.id===id)||CATS[0];

const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function brl(n){if(!n)return'R$0';n=Math.round(+n);if(n>=1e6)return'R$'+(n/1e6).toLocaleString('pt-BR',{maximumFractionDigits:1})+'mi';if(n>=1e3)return'R$'+Math.round(n/1e3)+'mil';return'R$'+n.toLocaleString('pt-BR');}
function brlFull(n){return'R$ '+Math.round(+n||0).toLocaleString('pt-BR');}
function fmtDate(s){if(!s)return'—';return new Date(s+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function fmtDateTime(iso){try{return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'2-digit'});}catch(e){return'';}}
function overdue(s){if(!s)return false;return new Date(s+'T00:00:00')<new Date(new Date().toDateString());}
function parseNum(s){return+(String(s).replace(/[^\d]/g,''))||0;}
function weekStart(base){const d=new Date(base);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);d.setHours(0,0,0,0);return d;}
function dateInRange(s,mode){
  if(!s)return false;
  const d=new Date(s+'T00:00:00');if(isNaN(d))return false;
  const now=new Date();now.setHours(0,0,0,0);
  if(mode==='cm')return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();
  const ws=weekStart(now);
  if(mode==='cw'){const we=new Date(ws);we.setDate(ws.getDate()+7);return d>=ws&&d<we;}
  if(mode==='nw'){const ns=new Date(ws);ns.setDate(ws.getDate()+7);const ne=new Date(ns);ne.setDate(ns.getDate()+7);return d>=ns&&d<ne;}
  return true;
}

function sortPipes(arr){
  return arr.sort((a,b)=>{
    const na=+a.nota||0, nb=+b.nota||0;
    if(nb!==na)return nb-na;                              // mais quente no topo
    const da=a.date?new Date(a.date+'T00:00:00').getTime():Infinity;
    const db=b.date?new Date(b.date+'T00:00:00').getTime():Infinity;
    return da-db;                                        // prazo mais proximo no topo; sem data por ultimo
  });
}
function visForCats(cats){
  return sortPipes(pipes.filter(p=>{
    if(!cats.includes(p.cat))return false;
    if(filterRank!=='all'&&rankOf(+p.nota)!==filterRank)return false;
    if(filterDate!=='all'&&!dateInRange(p.date,filterDate))return false;
    if(q){const t=(p.client+' '+p.next+' '+p.notes+' '+(p.stage||'')+' '+(p.subtype||'')).toLowerCase();if(!t.includes(q.toLowerCase()))return false;}
    return true;
  }));
}

/* ── render ── */
function wonStats(){const w=history.filter(h=>h.outcome==='Ganho');return{n:w.length,sum:w.reduce((a,p)=>a+(+p.value||0),0)};}
function renderHeaderTotal(){
  const tot=pipes.reduce((a,p)=>a+(+p.value||0),0);
  const w=wonStats();
  document.getElementById('htotal').innerHTML=`<span class="ht-v">${brl(tot)}</span><span class="ht-s">${pipes.length} em aberto · ${w.n} ganhos · ${brl(w.sum)}</span>`;
}
function renderSumbar(){
  const tot=pipes.reduce((a,p)=>a+(+p.value||0),0);
  const w=wonStats();
  let h=`<div class="sumcell s-all"><span class="sl">Total pipeline</span><span class="sv">${brl(tot)}</span><span class="ss">${pipes.length} em aberto · ${w.n} ganhos</span></div>`;
  COLUMNS.forEach(col=>{
    const items=pipes.filter(p=>col.cats.includes(p.cat));
    const sum=items.reduce((a,p)=>a+(+p.value||0),0);
    let sub='';
    if(col.mixed){const seg=items.filter(p=>p.cat==='seg').length,con=items.filter(p=>p.cat==='con').length;sub=`${seg} seg · ${con} cons`;}
    else sub=`${items.length} pipe${items.length!==1?'s':''}`;
    h+=`<div class="sumcell s-${col.cls}"><span class="sl">${col.name}</span><span class="sv">${brl(sum)}</span><span class="ss">${sub}</span></div>`;
  });
  document.getElementById('sumbar').innerHTML=h;
}

function renderGrid(){
  document.getElementById('grid').innerHTML=COLUMNS.map(col=>{
    const items=visForCats(col.cats);
    const sum=items.reduce((a,p)=>a+(+p.value||0),0);
    const cards=items.length?items.map(p=>cardHTML(p,col.mixed)).join(''):`<div class="empty-col">Sem pipes aqui.</div>`;
    const dots=col.mixed
      ? `<div class="col-dots">${col.cats.map(c=>`<span class="col-dot" style="background:${catById(c).color}"></span>`).join('')}</div>`
      : `<div class="col-dot" style="background:${catById(col.cats[0]).color}"></div>`;
    const presetCat=col.mixed?'seg':col.cats[0];
    return `<div class="col">
      <div class="col-head ${col.cls}">
        <div class="col-hl">${dots}<span class="col-name">${col.name}</span></div>
        <span class="col-badge">${items.length} · ${brl(sum)}</span>
      </div>
      <div class="col-body">${cards}</div>
      <div class="add-btn" data-cat="${presetCat}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>Adicionar pipe
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.pcard').forEach(card=>{
    attachCard(card);
    card.querySelector('.pc-del').onclick=e=>{e.stopPropagation();quickDel(card.dataset.id);};
  });
  document.querySelectorAll('.add-btn').forEach(btn=>{btn.onclick=()=>openModal(null,btn.dataset.cat);});
}

function cardHTML(p,showCat){
  const rank=rankOf(+p.nota), nota=+p.nota, cat=catById(p.cat);
  const dots=Array.from({length:10},(_,i)=>`<div class="dot ${i<nota?'on '+rank:''}"></div>`).join('');
  const od=overdue(p.date);
  const catrow=showCat?`<div class="pc-catrow"><span class="cat-dot" style="background:${cat.color}"></span>${cat.name}</div>`:'';
  const subchip=(p.cat==='cap'&&p.subtype)?`<div class="pc-sub">${esc(p.subtype)}</div>`:'';
  return `<div class="pcard" data-id="${p.id}" style="border-left-color:${cat.color}">
    <button class="pc-del" title="Excluir" aria-label="Excluir">✕</button>
    ${catrow}
    <div class="pc-top"><div class="pc-client">${esc(p.client)}</div><span class="pc-rank ${rank}">${rank}</span></div>
    <div class="pc-val">${brlFull(p.value)}</div>
    ${subchip}
    <div class="pc-nota"><span class="pc-nota-num" style="color:${RCO[rank]}">${nota}</span><div class="pc-dots">${dots}</div></div>
    ${p.next?`<div class="pc-next" title="${esc(p.next)}">→ ${esc(p.next)}</div>`:'<div class="pc-next" style="color:var(--muted);font-style:italic">Sem próxima ação</div>'}
    <div class="pc-foot"><span class="pc-stage">${esc(p.stage)}</span><span class="pc-date ${od?'od':''}">${fmtDate(p.date)}${od?' ⚠':''}</span></div>
  </div>`;
}

function render(){renderHeaderTotal();renderSumbar();renderGrid();}

/* ════════ DRAG (touch + mouse) ════════ */
let drag=null;
function zoneAt(x,y){for(const dz of document.querySelectorAll('.dz')){const r=dz.getBoundingClientRect();if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom)return dz.dataset.out;}return null;}
function highlightZones(x,y){document.querySelectorAll('.dz').forEach(dz=>{const r=dz.getBoundingClientRect();dz.classList.toggle('hot',x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom);});}
function clearZones(){document.querySelectorAll('.dz').forEach(dz=>dz.classList.remove('hot'));}

function attachCard(card){
  const id=card.dataset.id;
  let sx=0,sy=0,started=false,moved=false,holdTimer=null,pid=null;
  function begin(ev){
    started=true;moved=true;
    const r=card.getBoundingClientRect();
    const clone=card.cloneNode(true);
    clone.classList.add('drag-clone');
    clone.style.width=r.width+'px';clone.style.left=r.left+'px';clone.style.top=r.top+'px';
    document.body.appendChild(clone);
    document.body.classList.add('dragging');
    drag={id,card,clone,offX:ev.clientX-r.left,offY:ev.clientY-r.top};
    card.classList.add('drag-src');
    document.getElementById('dropzones').classList.add('show');
    try{card.setPointerCapture(pid);}catch(e){}
  }
  function onMove(ev){
    if(!started){
      if(Math.abs(ev.clientX-sx)>8||Math.abs(ev.clientY-sy)>8){
        moved=true;clearTimeout(holdTimer);
        if(ev.pointerType==='mouse')begin(ev); else finish(ev,false);
      }
      return;
    }
    ev.preventDefault();
    drag.clone.style.left=(ev.clientX-drag.offX)+'px';
    drag.clone.style.top=(ev.clientY-drag.offY)+'px';
    highlightZones(ev.clientX,ev.clientY);
  }
  function onUp(ev){finish(ev,true);}
  function onCancel(ev){finish(ev,false);}
  function detach(){window.removeEventListener('pointermove',onMove);window.removeEventListener('pointerup',onUp);window.removeEventListener('pointercancel',onCancel);}
  function finish(ev,allow){
    clearTimeout(holdTimer);detach();
    if(started){
      const out=allow?zoneAt(ev.clientX,ev.clientY):null;
      if(drag&&drag.clone)drag.clone.remove();
      card.classList.remove('drag-src');
      document.body.classList.remove('dragging');
      document.getElementById('dropzones').classList.remove('show');
      clearZones();drag=null;started=false;
      if(out)closePipe(id,out);
    }else{
      started=false;
      if(allow&&!moved)openModal(id);
    }
  }
  card.addEventListener('pointerdown',ev=>{
    if(ev.target.closest('.pc-del'))return;
    if(ev.button!==undefined&&ev.button>0)return;
    sx=ev.clientX;sy=ev.clientY;started=false;moved=false;pid=ev.pointerId;
    if(ev.pointerType!=='mouse')holdTimer=setTimeout(()=>begin(ev),200);
    window.addEventListener('pointermove',onMove,{passive:false});
    window.addEventListener('pointerup',onUp);
    window.addEventListener('pointercancel',onCancel);
  });
}

function closePipe(id,outcome){
  const i=pipes.findIndex(p=>p.id===id);if(i<0)return;
  const p=pipes[i];pipes.splice(i,1);
  history.unshift(Object.assign({},p,{outcome,closedAt:new Date().toISOString()}));
  persist();render();
  toast(outcome==='Ganho'?'🏆 Ganho! Salvo no Histórico':'Movido para Perdidos');
}

/* ── nota picker ── */
function buildNP(val){
  selNota=val==null?5:val;
  const r=rankOf(selNota);
  const el=document.getElementById('notaPicker');
  let h='';
  for(let i=0;i<=10;i++){const ri=rankOf(i);h+=`<div class="npd ${i===selNota?'sel '+ri:''}" data-n="${i}">${i}</div>`;}
  h+=`<span class="nplabel" style="background:${RC[r]};color:${RCO[r]}">${RL[r]}</span>`;
  el.innerHTML=h;
  el.querySelectorAll('.npd').forEach(d=>d.onclick=()=>buildNP(+d.dataset.n));
}

/* ── modal ── */
function fillSelects(){
  document.getElementById('f-cat').innerHTML=CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('f-stage').innerHTML=STAGES.map(s=>`<option>${s}</option>`).join('');
  document.getElementById('f-subtype').innerHTML=SUBTYPES.map(s=>`<option>${s}</option>`).join('');
}
function toggleSubtype(){document.getElementById('subtypeField').style.display=document.getElementById('f-cat').value==='cap'?'flex':'none';}
function buildNextSelect(cur){
  const sel=document.getElementById('f-next');
  let opts=NEXT_ACTIONS.slice();
  if(cur&&!opts.includes(cur))opts=[cur].concat(opts);
  sel.innerHTML=opts.map(o=>`<option value="${esc(o)}">${esc(o)}</option>`).join('');
  sel.value=cur||NEXT_ACTIONS[0];
}
function buildValueSelect(cat,cur,preserve){
  const sel=document.getElementById('f-value');
  const vals=valueRange(cat); cur=+cur||0;
  let all=vals.slice();
  if(preserve&&cur&&!vals.includes(cur)){all=[cur].concat(vals).sort((a,b)=>a-b);}
  sel.innerHTML=all.map(v=>`<option value="${v}">${brlFull(v)}</option>`).join('');
  sel.value=String(all.includes(cur)?cur:vals[0]);
}
function onCatChange(){
  toggleSubtype();
  buildValueSelect(document.getElementById('f-cat').value, +document.getElementById('f-value').value||0, false);
}
function openModal(id,presetCat){
  editId=id||null;
  const p=id?pipes.find(x=>x.id===id):{};
  document.getElementById('mTitle').textContent=id?'Editar pipe':'Novo pipe';
  document.getElementById('btnDel').style.display=id?'block':'none';
  document.getElementById('f-client').value=p.client||'';
  document.getElementById('f-cat').value=p.cat||presetCat||'rv';
  document.getElementById('f-subtype').value=p.subtype||'Previdência';
  document.getElementById('f-stage').value=p.stage||'Primeiro contato';
  buildNP(p.nota==null?5:p.nota);
  buildNextSelect(p.next);
  buildValueSelect(document.getElementById('f-cat').value, p.value, true);
  document.getElementById('f-date').value=p.date||'';
  document.getElementById('f-notes').value=p.notes||'';
  toggleSubtype();
  document.getElementById('overlay').classList.add('open');
  /* sem foco automático: evita abrir o teclado no iPad */
}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function saveModal(){
  const client=document.getElementById('f-client').value.trim();
  if(!client){document.getElementById('f-client').focus();return;}
  const cat=document.getElementById('f-cat').value;
  const data={client,cat,stage:document.getElementById('f-stage').value,
    subtype:cat==='cap'?document.getElementById('f-subtype').value:'',
    nota:selNota,value:parseNum(document.getElementById('f-value').value),
    date:document.getElementById('f-date').value,next:document.getElementById('f-next').value,
    notes:document.getElementById('f-notes').value.trim()};
  if(editId){Object.assign(pipes.find(x=>x.id===editId),data);}
  else{pipes.unshift(Object.assign({id:uid()},data));}
  persist();render();closeModal();
}
function quickDel(id){if(!confirm('Excluir este pipe definitivamente?'))return;pipes=pipes.filter(x=>x.id!==id);persist();render();}

/* ── histórico ── */
function openHist(){renderHist();document.getElementById('histOverlay').classList.add('open');}
function closeHist(){document.getElementById('histOverlay').classList.remove('open');}
function renderHist(){
  const won=history.filter(h=>h.outcome==='Ganho'),lost=history.filter(h=>h.outcome==='Perdido');
  const ws=won.reduce((a,p)=>a+(+p.value||0),0),ls=lost.reduce((a,p)=>a+(+p.value||0),0);
  document.getElementById('histSum').innerHTML=
    `<div class="hs"><div class="l">🏆 Ganhos</div><div class="v" style="color:var(--green)">${brl(ws)}</div><div class="l" style="margin-top:2px">${won.length} pipe(s)</div></div>
     <div class="hs"><div class="l">🗑️ Perdidos</div><div class="v" style="color:var(--red)">${brl(ls)}</div><div class="l" style="margin-top:2px">${lost.length} pipe(s)</div></div>`;
  const list=document.getElementById('histList');
  if(!history.length){list.innerHTML='<div class="hist-empty">Nada no histórico ainda. Arraste um pipe para 🏆 ou 🗑️.</div>';return;}
  list.innerHTML=history.map(h=>{
    const cat=catById(h.cat);
    return `<div class="hitem" data-id="${h.id}">
      <div class="hi-main">
        <div class="hi-out ${h.outcome}">${h.outcome==='Ganho'?'🏆':'🗑️'}</div>
        <div><div class="hi-client">${esc(h.client)}</div>
        <div class="hi-meta">${cat.name}${h.cat==='cap'&&h.subtype?' · '+esc(h.subtype):''} · ${brlFull(h.value)} · ${fmtDateTime(h.closedAt)}</div></div>
      </div>
      <div class="hi-act"><button class="reopen" data-act="reopen">Reabrir</button><button class="del" data-act="del">Excluir</button></div>
    </div>`;
  }).join('');
  list.querySelectorAll('.hitem').forEach(it=>{
    const id=it.dataset.id;
    it.querySelector('[data-act=reopen]').onclick=()=>reopenHist(id);
    it.querySelector('[data-act=del]').onclick=()=>delHist(id);
  });
}
function reopenHist(id){
  const i=history.findIndex(h=>h.id===id);if(i<0)return;
  const h=history[i];history.splice(i,1);
  const p=Object.assign({},h);delete p.outcome;delete p.closedAt;
  if(!STAGES.includes(p.stage))p.stage='Negociação';
  pipes.unshift(p);persist();renderHist();render();toast('Pipe reaberto no quadro');
}
function delHist(id){if(!confirm('Excluir este registro do histórico?'))return;history=history.filter(h=>h.id!==id);persist();renderHist();render();}

/* ── toast ── */
let toastT;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}

/* ── backup / restore (inclui histórico) ── */
function doExport(){
  const payload={version:2,exportedAt:new Date().toISOString(),pipes,history};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}));
  a.download='rico-pipeline-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  toast('Backup baixado ✓');
}
function normPipe(p){return{id:p.id||uid(),client:p.client||'',cat:p.cat||'rv',stage:p.stage||'Primeiro contato',subtype:p.subtype||'',nota:+p.nota||0,value:+p.value||0,date:p.date||'',next:p.next||'',notes:p.notes||'',outcome:p.outcome,closedAt:p.closedAt};}
function doImport(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const data=JSON.parse(rd.result);
      let np,nh;
      if(Array.isArray(data)){np=data;nh=null;}
      else{np=data.pipes;nh=data.history;}
      if(!Array.isArray(np))throw 0;
      const cnt=np.length+(Array.isArray(nh)?nh.length:0);
      if(!confirm('Restaurar '+cnt+' registro(s) deste backup? Os dados atuais serão substituídos.'))return;
      pipes=np.map(normPipe).map(p=>{delete p.outcome;delete p.closedAt;return p;});
      history=Array.isArray(nh)?nh.map(p=>{const x=normPipe(p);x.outcome=x.outcome||'Ganho';x.closedAt=x.closedAt||new Date().toISOString();return x;}):history;
      persist();render();toast('Backup restaurado ✓');
    }catch(e){toast('Arquivo de backup inválido');}
  };
  rd.readAsText(file);
}

/* ── wire ── */
function wire(){
  document.getElementById('btnAdd').onclick=()=>openModal(null);
  document.getElementById('btnClose').onclick=closeModal;
  document.getElementById('btnCancel').onclick=closeModal;
  document.getElementById('btnSave').onclick=saveModal;
  document.getElementById('f-cat').onchange=onCatChange;
  document.getElementById('btnDel').onclick=()=>{if(editId&&confirm('Excluir este pipe definitivamente?')){pipes=pipes.filter(x=>x.id!==editId);persist();render();closeModal();}};
  document.getElementById('btnExport').onclick=doExport;
  document.getElementById('btnImport').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=e=>{if(e.target.files[0])doImport(e.target.files[0]);e.target.value='';};
  document.getElementById('btnHist').onclick=openHist;
  document.getElementById('histClose').onclick=closeHist;
  document.getElementById('histCloseBtn').onclick=closeHist;
  document.getElementById('histOverlay').onclick=e=>{if(e.target.id==='histOverlay')closeHist();};
  document.getElementById('search').oninput=e=>{q=e.target.value;renderGrid();};
  document.querySelectorAll('.rc[data-r]').forEach(chip=>{
    chip.onclick=()=>{filterRank=chip.dataset.r;document.querySelectorAll('.rc[data-r]').forEach(c=>{c.className='rc'+(c.dataset.r===filterRank?' on-'+(filterRank==='all'?'all':filterRank.toLowerCase()):'');});renderGrid();};
  });
  document.querySelectorAll('.rc[data-d]').forEach(chip=>{
    chip.onclick=()=>{filterDate=chip.dataset.d;document.querySelectorAll('.rc[data-d]').forEach(c=>c.classList.toggle('on',c.dataset.d===filterDate));renderGrid();};
  });
  document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeModal();};
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeHist();}});
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')persist();});
  window.addEventListener('pagehide',persist);
}

init();
</script>
